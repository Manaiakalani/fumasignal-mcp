name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned rather than the "v4" tag - see ci.yml for the rationale
      # shared by both workflows, and the changesets/action step below for
      # why this release job in particular (write + publish credentials)
      # is especially sensitive to a re-tagged action.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # Runs typecheck+lint+test+build (in that order), not just build:
      # `npm run build` alone only ran tsup, whose esbuild-based transpile
      # doesn't type-check and would happily emit a publishable bundle from
      # source with type errors, lint violations, or failing tests -
      # ci.yml's own test matrix runs against the *same* push event but is
      # a separate workflow with no `needs:` relationship to this one, so
      # it cannot actually block this job from publishing regardless of its
      # own result.
      - run: npm run check
      - name: Create release PR or publish
        # Pinned to a commit SHA rather than the "v1" ref: unlike
        # actions/* above (GitHub's own namespace), "v1" here is a mutable
        # branch (not even a tag) in a third-party repo, and this step
        # runs with contents/pull-requests write plus GITHUB_TOKEN and
        # NPM_TOKEN - a compromised "v1" would get arbitrary code
        # execution with npm-publish and repo-write credentials.
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npx changeset publish
          # `changeset version` only rewrites package.json/CHANGELOG.md; it
          # never touches package-lock.json, so a bare `npx changeset
          # version` silently leaves the lockfile's "version" field
          # pointing at the *previous* release on every future bump
          # (exactly what happened for the 0.1.0 -> 0.1.1 jump). The
          # changesets/action `version` input is passed straight to a single
          # command invocation (it errors with "too many arguments" on a
          # compound `a && b` string), so the lockfile-sync step lives in
          # the "changeset-version" npm script instead and this just calls
          # that script.
          version: npm run changeset-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
